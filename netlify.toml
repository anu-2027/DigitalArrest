[build]
  command   = "pip install -r requirements.txt"
  functions = "netlify/functions"
  publish   = "."

[build.environment]
  PYTHON_VERSION = "3.12"

# Bundle Flask templates and static files into the Lambda package
[functions."api"]
  included_files = ["templates/**", "static/**", "app.py"]

# All requests → Flask serverless handler
# Netlify serves real files (static/) directly before hitting this redirect
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/api"
  status = 200
